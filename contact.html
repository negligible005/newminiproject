<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unio | Contact Sales</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#2563eb", "navy-950": "#0f172a" },
                    fontFamily: { sans: ["Inter", "sans-serif"] }
                }
            }
        };
    </script>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-white border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-xl overflow-hidden">
                    <video src="yo.mp4" autoplay muted loop playsinline class="w-full h-full object-cover"></video>
                </div>
                <span class="text-2xl font-bold tracking-tight text-navy-950">UNIO</span>
            </a>
            <a href="index.html" class="text-sm font-semibold text-slate-500 hover:text-primary">Back to Home</a>
        </div>
    </header>

    <!-- Content -->
    <main class="flex-grow flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-2xl shadow-xl max-w-lg w-full border border-slate-100">
            <h1 class="text-3xl font-bold mb-2 text-navy-950">Talk to Sales</h1>
            <p class="text-slate-500 mb-8">Interested in enterprise solutions? Let's talk.</p>

            <form class="space-y-4"
                onsubmit="event.preventDefault(); alert('Message sent!'); window.location.href='index.html';">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
                    <input type="text" required
                        class="w-full rounded-lg border-slate-300 focus:ring-primary focus:border-primary">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Work Email</label>
                    <input type="email" required
                        class="w-full rounded-lg border-slate-300 focus:ring-primary focus:border-primary">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Message</label>
                    <textarea rows="4" required
                        class="w-full rounded-lg border-slate-300 focus:ring-primary focus:border-primary"></textarea>
                </div>
                <button type="submit"
                    class="w-full bg-primary text-white py-3 rounded-xl font-bold hover:bg-blue-600 transition-colors">
                    Send Message
                </button>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-8 text-center text-sm text-slate-500">
        &copy; 2024 UNIO Technologies.
    </footer>
</body>

</html>
